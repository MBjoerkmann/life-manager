<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Life Manager{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
  <style>
    /* -----------------------------------------------------------------------
       Reset & base
    ----------------------------------------------------------------------- */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --surface:   #1a1a1a;
      --surface2:  #242424;
      --border:    #2e2e2e;
      --text:      #e2e2e2;
      --muted:     #888;
      --accent:    #4f8ef7;
      --accent-h:  #3a78e0;
      --green:     #3ecf8e;
      --red:       #f76f6f;
      --yellow:    #f7c94f;
      --radius:    10px;
      --radius-sm: 6px;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* -----------------------------------------------------------------------
       Nav
    ----------------------------------------------------------------------- */
    nav {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      gap: 0.25rem;
      height: 52px;
    }

    .nav-brand {
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--text);
      margin-right: auto;
      letter-spacing: -0.3px;
    }

    .nav-link {
      padding: 0.35rem 0.75rem;
      border-radius: var(--radius-sm);
      color: var(--muted);
      font-size: 0.9rem;
      transition: color 0.15s, background 0.15s;
    }

    .nav-link:hover { color: var(--text); background: var(--surface2); text-decoration: none; }
    .nav-link.active { color: var(--accent); background: rgba(79,142,247,0.1); }

    /* -----------------------------------------------------------------------
       Page container
    ----------------------------------------------------------------------- */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* -----------------------------------------------------------------------
       Typography helpers
    ----------------------------------------------------------------------- */
    h1 { font-size: 1.6rem; font-weight: 700; letter-spacing: -0.5px; }
    h2 { font-size: 1.2rem; font-weight: 600; }
    h3 { font-size: 1rem; font-weight: 600; }

    .text-muted { color: var(--muted); font-size: 0.875rem; }
    .text-sm    { font-size: 0.875rem; }

    /* -----------------------------------------------------------------------
       Cards
    ----------------------------------------------------------------------- */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
    }

    /* -----------------------------------------------------------------------
       Buttons
    ----------------------------------------------------------------------- */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.9rem;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 0.85rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
    }

    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-primary  { background: var(--accent);   color: #fff; }
    .btn-primary:hover  { background: var(--accent-h); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-ghost:hover { color: var(--text); border-color: #555; background: var(--surface2); }

    .btn-danger { background: rgba(247,111,111,0.15); color: var(--red); border: 1px solid rgba(247,111,111,0.3); }
    .btn-danger:hover { background: rgba(247,111,111,0.25); }

    .btn-success { background: rgba(62,207,142,0.15); color: var(--green); border: 1px solid rgba(62,207,142,0.3); }
    .btn-success:hover { background: rgba(62,207,142,0.25); }

    .btn-sm { padding: 0.3rem 0.65rem; font-size: 0.8rem; }

    /* -----------------------------------------------------------------------
       Forms
    ----------------------------------------------------------------------- */
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    label { font-size: 0.8rem; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: 0.04em; }

    input[type="text"],
    input[type="number"],
    input[type="date"],
    textarea,
    select {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 0.9rem;
      padding: 0.55rem 0.75rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }

    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    @media (max-width: 480px) { .form-row { grid-template-columns: 1fr; } }

    .inline-form {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    /* -----------------------------------------------------------------------
       Status badges
    ----------------------------------------------------------------------- */
    .badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .badge-todo        { background: rgba(136,136,136,0.18); color: var(--muted); }
    .badge-in_progress { background: rgba(79,142,247,0.2);   color: var(--accent); }
    .badge-done        { background: rgba(62,207,142,0.18);  color: var(--green); }
    .badge-skipped     { background: rgba(136,136,136,0.1);  color: #555; }

    .priority-pip {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
    }

    .pri-5 { background: #f76f6f; }
    .pri-4 { background: #f7a44f; }
    .pri-3 { background: #f7c94f; }
    .pri-2 { background: #8ef74f; }
    .pri-1 { background: #555; }

    /* -----------------------------------------------------------------------
       Task cards
    ----------------------------------------------------------------------- */
    .task-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      transition: border-color 0.2s;
    }

    .task-card.status-in_progress { border-color: rgba(79,142,247,0.4); }
    .task-card.status-done        { opacity: 0.55; }
    .task-card.status-skipped     { opacity: 0.4; }

    .task-card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 0.5rem;
    }

    .task-card-title { font-weight: 600; font-size: 0.95rem; }
    .task-card-meta  { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; }

    .task-card-actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      align-items: center;
    }

    /* -----------------------------------------------------------------------
       Timer / session panel
    ----------------------------------------------------------------------- */
    .session-panel {
      background: rgba(79,142,247,0.08);
      border: 1px solid rgba(79,142,247,0.25);
      border-radius: var(--radius-sm);
      padding: 0.75rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .timer-display {
      font-size: 1.8rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
      color: var(--accent);
    }

    /* -----------------------------------------------------------------------
       Stats strip
    ----------------------------------------------------------------------- */
    .stats-strip {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
      margin: 1.5rem 0;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.9rem 1rem;
      text-align: center;
    }

    .stat-number { font-size: 2rem; font-weight: 700; line-height: 1; color: var(--accent); }
    .stat-label  { font-size: 0.75rem; color: var(--muted); margin-top: 0.3rem; }

    /* -----------------------------------------------------------------------
       Section spacing
    ----------------------------------------------------------------------- */
    .section { margin-top: 2rem; }
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1rem;
    }

    .task-list     { display: flex; flex-direction: column; gap: 0.6rem; }
    .goal-list     { display: flex; flex-direction: column; gap: 1rem; }
    .project-list  { display: flex; flex-direction: column; gap: 0.5rem; margin-top: 0.6rem; padding-left: 1rem; }

    /* -----------------------------------------------------------------------
       Goal / project items
    ----------------------------------------------------------------------- */
    .goal-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .goal-item-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.9rem 1.25rem;
      gap: 0.5rem;
    }

    .goal-item-body { padding: 0 1.25rem 1.25rem; }

    .project-item {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0.65rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    /* -----------------------------------------------------------------------
       Filter tabs
    ----------------------------------------------------------------------- */
    .filter-tabs {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-bottom: 1.25rem;
    }

    .filter-tab {
      padding: 0.35rem 0.85rem;
      border-radius: 99px;
      font-size: 0.83rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
    }

    .filter-tab:hover { color: var(--text); border-color: #555; text-decoration: none; }
    .filter-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* -----------------------------------------------------------------------
       Overdue banner
    ----------------------------------------------------------------------- */
    .overdue-label {
      font-size: 0.78rem;
      font-weight: 600;
      color: var(--yellow);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    /* -----------------------------------------------------------------------
       Collapsible
    ----------------------------------------------------------------------- */
    details > summary { cursor: pointer; list-style: none; }
    details > summary::-webkit-details-marker { display: none; }

    /* -----------------------------------------------------------------------
       HTMX indicator
    ----------------------------------------------------------------------- */
    .htmx-indicator { opacity: 0; transition: opacity 0.2s; }
    .htmx-request .htmx-indicator { opacity: 1; }

    /* -----------------------------------------------------------------------
       Utility
    ----------------------------------------------------------------------- */
    .mt-1 { margin-top: 0.5rem; }
    .mt-2 { margin-top: 1rem; }
    .mt-3 { margin-top: 1.5rem; }
    .flex  { display: flex; }
    .gap-2 { gap: 0.5rem; }
    .align-center { align-items: center; }
    .justify-between { justify-content: space-between; }
    .w-full { width: 100%; }
    .hidden { display: none !important; }
    .empty-state { color: var(--muted); font-size: 0.9rem; padding: 1.5rem 0; text-align: center; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <span class="nav-brand">&#9670; Life Manager</span>
      <a href="/"          class="nav-link {% if request.url.path == '/' %}active{% endif %}">Today</a>
      <a href="/week"      class="nav-link {% if request.url.path == '/week' %}active{% endif %}">Week</a>
      <a href="/goals"     class="nav-link {% if request.url.path.startswith('/goals') %}active{% endif %}">Goals</a>
      <a href="/projects"  class="nav-link {% if request.url.path.startswith('/projects') %}active{% endif %}">Projects</a>
      <a href="/tasks"     class="nav-link {% if request.url.path.startswith('/tasks') %}active{% endif %}">Tasks</a>
      <a href="/journal"   class="nav-link {% if request.url.path.startswith('/journal') %}active{% endif %}">Journal</a>
      <a href="/review"    class="nav-link {% if request.url.path == '/review' %}active{% endif %}">Review</a>
    </div>
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <script>
    // Elapsed-time counters for active sessions
    function startTimer(spanId, startedAt) {
      const el = document.getElementById(spanId);
      if (!el) return;
      const start = new Date(startedAt + 'Z').getTime();
      function tick() {
        const diff = Math.floor((Date.now() - start) / 1000);
        const h = Math.floor(diff / 3600);
        const m = Math.floor((diff % 3600) / 60);
        const s = diff % 60;
        el.textContent = h > 0
          ? `${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`
          : `${m}:${String(s).padStart(2,'0')}`;
      }
      tick();
      return setInterval(tick, 1000);
    }

    // Re-initialise timers after HTMX swaps
    document.addEventListener('htmx:afterSwap', initTimers);
    document.addEventListener('DOMContentLoaded', initTimers);

    function initTimers() {
      document.querySelectorAll('[data-timer]').forEach(el => {
        const id = el.dataset.timer;
        const startedAt = el.dataset.startedAt;
        if (!el._timerStarted) {
          el._timerStarted = true;
          startTimer(id + '-clock', startedAt);
        }
      });
    }
  </script>
</body>
</html>
